site_name: dotd
site_description: A dotfiles manager for people who use more than one machine
site_url: https://rocne.github.io/dot-dagger/
repo_url: https://github.com/rocne/dot-dagger
repo_name: rocne/dot-dagger
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
    - Installation: getting-started/index.md
    - Your first machine: getting-started/first-machine.md
  - Concepts:
    - Annotations: concepts/annotations.md
    - Conditions: concepts/conditions.md
    - Load order: concepts/load-order.md
    - File identity: concepts/file-identity.md
  - Reference:
    - dotd: reference/dotd.md
    - Annotations: reference/annotations.md
    - env.yaml: reference/env-yaml.md
    - packages.yaml: reference/packages-yaml.md
    - .dotd.yaml: reference/dotd-yaml.md
