version: 2

project_name: dotp

before:
  hooks:
    - go mod tidy

builds:
  - id: dotp
    binary: dotp
    main: ./cmd/dotp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Env.VERSION}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: dotp
    builds: [dotp]
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

release:
  tag: "{{.Env.FULL_TAG}}"
  name_template: "dotp {{.Version}}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Tag }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
