version: 2

project_name: dotd

before:
  hooks:
    - go mod tidy

builds:
  - id: dotd
    binary: dotd
    main: ./cmd/dotd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Env.VERSION}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: dotd
    builds: [dotd]
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

brews:
  - name: dot-dagger
    ids: [dotd]
    repository:
      owner: rocne
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/rocne/dot-dagger
    description: Dotfiles manager — env resolution, DAG, symlinks, and packages
    license: MIT
    install: |
      bin.install "dotd"
    test: |
      system "#{bin}/dotd", "--version"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Tag }}_checksums.txt"

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
