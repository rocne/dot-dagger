name: Auto patch release

# Triggers on every push to main (i.e. after every PR merge).
# Bumps the patch version of dotd when cmd/dotd/** or internal/** changes.
#
# Tags are created via `gh release create` (not git push), so this workflow
# does NOT trigger the manual release workflow. That remains available for
# controlled releases.

on:
  push:
    branches: [main]

# Serialize runs so concurrent PR merges don't race on tag names.
concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Detect changes
        id: detect
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA")
          fi

          echo "Changed files:"
          echo "$CHANGED"

          INTERNAL=$(echo "$CHANGED" | grep -c "^internal/" || true)
          CMD=$(echo "$CHANGED" | grep -c "^cmd/dotd/" || true)

          if [ "$INTERNAL" -gt 0 ] || [ "$CMD" -gt 0 ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "dotd code changed — will release"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No dotd code changed — skipping release"
          fi

      - name: Release dotd
        if: steps.detect.outputs.release == 'true'
        run: |
          LATEST=$(git tag --list "v*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1.0"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "==> dotd: $LATEST → $NEW_TAG"

          # Skip if this release was already created (e.g. manual tag race)
          if gh release view "$NEW_TAG" &>/dev/null; then
            echo "Release $NEW_TAG already exists — skipping"
            exit 0
          fi

          # Build archives (no publish — gh handles the release)
          GORELEASER_CURRENT_TAG="$NEW_TAG" VERSION="$NEW_TAG" goreleaser release \
            --config ".goreleaser/dotd.yaml" \
            --clean \
            --skip=validate,publish

          # Create GitHub release and tag atomically
          gh release create "$NEW_TAG" \
            --title "dotd $NEW_TAG" \
            --generate-notes \
            --target "${{ github.sha }}" \
            dist/*.tar.gz \
            dist/*_checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
