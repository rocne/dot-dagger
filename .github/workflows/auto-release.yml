name: Auto patch release

# Triggers on every push to main (i.e. after every PR merge).
# Bumps the patch version of dotd when cmd/dotd/** or internal/** changes.
#
# The version-decision logic (change detection, patch math, race guard) lives
# here because it is auto-specific. The actual release + e2e is delegated to the
# reusable _release.yml, shared with the manual release.yml path.
#
# Tags are created by GoReleaser as part of publishing the release. That does
# NOT trigger the manual release workflow (push.tags fires only on direct git
# pushes, not API-created tags).

on:
  push:
    branches: [main]

# Serialize runs so concurrent PR merges don't race on tag names.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA")
          fi

          echo "Changed files:"
          echo "$CHANGED"

          INTERNAL=$(echo "$CHANGED" | grep -c "^internal/" || true)
          CMD=$(echo "$CHANGED" | grep -c "^cmd/dotd/" || true)

          if [ "$INTERNAL" -gt 0 ] || [ "$CMD" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "dotd code changed — will release"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dotd code changed — skipping release"
          fi

      - name: Decide version
        id: decide
        if: steps.detect.outputs.changed == 'true'
        run: |
          LATEST=$(git tag --list "v*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEW_TAG="v0.1.0"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "==> dotd: $LATEST → $NEW_TAG"

          # Skip if this release already exists (e.g. manual tag race).
          if gh release view "$NEW_TAG" &>/dev/null; then
            echo "Release $NEW_TAG already exists — skipping"
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_TAG" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: compute
    if: needs.compute.outputs.release == 'true'
    permissions:
      contents: write
      issues: write
    uses: ./.github/workflows/_release.yml
    with:
      version: ${{ needs.compute.outputs.version }}
    secrets: inherit
