name: _secret-digest (temp)

# TEMP diagnostic — DELETE after use.
# Prints truncated HMAC-SHA256 digests of the three release secrets. Here in
# dot-dagger these resolve to the known-good REPO-level secrets; compare the
# digests against release-ci's run (which resolves the ORG-level values) to
# confirm the org secrets were set to the same bytes. Prints DIGESTS ONLY.

on:
  workflow_dispatch:

permissions: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Print secret digests (not values)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          for s in GPG_PRIVATE_KEY CLOUDSMITH_API_KEY HOMEBREW_TAP_GITHUB_TOKEN; do
            eval v=\$$s
            if [ -z "$v" ]; then echo "$s: MISSING"; continue; fi
            printf '%s' "$v" | openssl dgst -sha256 -hmac "compare-salt-v1" -r \
              | cut -c1-16 | sed "s/^/$s: /"
          done
