name: Release dry-run

# Signing gate. Builds + signs a SNAPSHOT release (no publish, no Homebrew push)
# and verifies the signature, to de-risk the signing pipeline before a real
# release. Does NOT validate the _release.yml signing identity (different workflow
# file) — only that the goreleaser signs block, cosign install, permissions, and
# verify mechanics work.
#
# Runs automatically on PRs that touch release-signing files (workflow_dispatch
# can't be triggered from a branch until the workflow is on the default branch),
# and is also available manually once merged.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .goreleaser/**
      - .github/workflows/_release.yml
      - .github/workflows/release-dryrun.yml
      - install.sh

permissions:
  contents: read
  id-token: write

jobs:
  dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@v3

      - name: Build + sign snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --config .goreleaser/dotd.yaml --clean --snapshot --skip=publish
        env:
          VERSION: v0.0.0-dryrun

      - name: Verify the snapshot signature
        run: |
          CHECKSUMS=$(ls dist/*checksums.txt)
          cosign verify-blob \
            --certificate "${CHECKSUMS}.pem" \
            --signature   "${CHECKSUMS}.sig" \
            --certificate-identity-regexp "^https://github\.com/${{ github.repository }}/\.github/workflows/release-dryrun\.yml@" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$CHECKSUMS"
