name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Secret scan (rocne/release-ci#46, audit row 19 — should, mandatory-defended).
  # Full history, every ref; bare pinned+checksummed binary (not gitleaks-action,
  # which needs a paid license on org accounts). Version bumps are a manual edit
  # of the URL + checksum together — Dependabot doesn't track release downloads.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the scan walks every commit
          persist-credentials: false
      - name: Download gitleaks (pinned, checksum-verified)
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
      - name: Scan full history for secrets
        run: ./gitleaks git . --redact --no-banner --log-opts="--all"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Integration test
        run: go test -tags integration ./cmd/dotd/

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Pre-release e2e
        run: ./test/run-e2e.sh

  # Vendored-installer drift check (rocne/release-ci#53, D36): the repo-root
  # install.sh must stay byte-identical to the pinned release-ci canonical
  # outside the per-consumer config block. Catches a vendored copy that drifts
  # from the pipeline (e.g. the cosign verify contract, #52) before a user's
  # install does. Owned once in release-ci, pinned by tag like the D34 assert.
  installer-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Fetch the drift assertion from release-ci
        uses: actions/checkout@v7
        with:
          repository: rocne/release-ci
          ref: v0.1.5
          path: .release-ci
          persist-credentials: false
      - name: Assert the vendored installer has not drifted (D36)
        run: sh .release-ci/release-dryrun/assert-vendored-installer.sh ./install.sh
