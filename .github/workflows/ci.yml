name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Secret scan (rocne/release-ci#46, audit row 19 — should, mandatory-defended).
  # Full history, every ref; bare pinned+checksummed binary (not gitleaks-action,
  # which needs a paid license on org accounts). Version bumps are a manual edit
  # of the URL + checksum together — Dependabot doesn't track release downloads.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — the scan walks every commit
          persist-credentials: false
      - name: Download gitleaks (pinned, checksum-verified)
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
      - name: Scan full history for secrets
        run: ./gitleaks git . --redact --no-banner --log-opts="--all"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Integration test
        run: go test -tags integration ./cmd/dotd/

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Pre-release e2e
        run: ./test/run-e2e.sh
