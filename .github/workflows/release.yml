name: Release dotd

# Manual release path: push a tag (e.g. `git push origin v0.5.0`) to cut a
# controlled minor/major release. The auto-release workflow only ever bumps the
# patch version, so this is how non-patch versions get released.
#
# Delegates the actual release + e2e to the reusable _release.yml so the manual
# and auto paths can never drift.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
      issues: write
    uses: ./.github/workflows/_release.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit
