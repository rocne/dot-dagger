name: Release dotd

# Break-glass release path: push a tag (e.g. `git push origin v0.6.1`) to cut a
# release by hand. The primary path is release-please.yml (merge the standing
# release PR); use this only when that can't run — e.g. re-cutting a botched
# release.
#
# Delegates the actual release + e2e to the reusable _release.yml so the manual
# and release-please paths can never drift.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
      issues: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/_release.yml
    with:
      version: ${{ github.ref_name }}
    secrets: inherit
