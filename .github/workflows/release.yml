name: Release dotd

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --config .goreleaser/dotd.yaml --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.VERSION }}

  e2e:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [ubuntu]
    steps:
      - uses: actions/checkout@v4

      - name: Run e2e tests (${{ matrix.distro }})
        run: ./test/run-e2e.sh
        env:
          DOTD_VERSION: ${{ github.ref_name }}

      - name: Open issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "e2e failure: ${{ github.ref_name }} (${{ matrix.distro }})" \
            --body "E2e tests failed for release [${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}) on \`${{ matrix.distro }}\`.\n\nWorkflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
