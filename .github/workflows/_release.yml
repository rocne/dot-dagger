name: Release (reusable)

# Shared release body. Callers decide WHEN and at WHAT version; this defines
# HOW we release and verify. Invoked via workflow_call by:
#   - release-please.yml (primary: merging the standing release PR)
#   - release.yml        (break-glass: human-pushed tag)
#
# version is the tag to release (e.g. v0.6.1). The git tag already exists by the
# time we run (release-please creates it on PR merge; the manual path pushes it),
# so GORELEASER_CURRENT_TAG just points GoReleaser at it. VERSION is also exported
# because .goreleaser/dotd.yaml stamps it into the binary's ldflags.

on:
  workflow_call:
    inputs:
      version:
        description: "Tag/version to release (e.g. v0.5.4)"
        required: true
        type: string

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --config .goreleaser/dotd.yaml --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.version }}
          VERSION: ${{ inputs.version }}

  e2e:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [ubuntu]
    steps:
      - uses: actions/checkout@v6

      - name: Run e2e tests (${{ matrix.distro }})
        run: ./test/run-e2e-release.sh
        env:
          DOTD_VERSION: ${{ inputs.version }}

      - name: Open issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "e2e failure: ${{ inputs.version }} (${{ matrix.distro }})" \
            --body "E2e tests failed for release [${{ inputs.version }}](https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}) on \`${{ matrix.distro }}\`.\n\nWorkflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
