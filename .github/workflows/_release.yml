name: Release (reusable)

# Shared release body. Callers decide WHEN and at WHAT version; this defines
# HOW we release and verify. Invoked via workflow_call by:
#   - release-please.yml (primary: merging the standing release PR)
#   - release.yml        (break-glass: human-pushed tag)
#
# version is the tag to release (e.g. v0.6.1). The git tag already exists by the
# time we run (release-please creates it on PR merge; the manual path pushes it),
# so GORELEASER_CURRENT_TAG just points GoReleaser at it. VERSION is also exported
# because .goreleaser/dotd.yaml stamps it into the binary's ldflags.

on:
  workflow_call:
    inputs:
      version:
        description: "Tag/version to release (e.g. v0.5.4)"
        required: true
        type: string

permissions:
  contents: write
  issues: write

# Opt JavaScript actions (e.g. actions/attest-build-provenance) into Node 24 ahead
# of GitHub's 2026-06-16 forced Node-20 migration. Safe no-op once Node 24 is the
# default; remove when all actions ship Node24-native releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: sigstore/cosign-installer@v3

      - name: Prepare package signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          umask 077
          printf '%s' "$GPG_PRIVATE_KEY" > "$RUNNER_TEMP/dotd-signing-key.asc"
          echo "GPG_KEY_PATH=$RUNNER_TEMP/dotd-signing-key.asc" >> "$GITHUB_ENV"

      # Used by the cloudsmith custom publisher in .goreleaser/dotd.yaml to push
      # the signed .deb/.rpm to the hosted apt/dnf repo.
      - name: Install Cloudsmith CLI
        run: pipx install cloudsmith-cli

      - name: Release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --config .goreleaser/dotd.yaml --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.version }}
          VERSION: ${{ inputs.version }}
          GPG_KEY_PATH: ${{ env.GPG_KEY_PATH }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/dotd_*.tar.gz

  e2e:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [ubuntu]
    steps:
      - uses: actions/checkout@v6

      - uses: sigstore/cosign-installer@v3

      - name: Verify release signature and provenance
        run: |
          TAG="${{ inputs.version }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"
          CHECKSUMS="dotd_${TAG}_checksums.txt"
          ARCHIVE="dotd_${TAG}_linux_amd64.tar.gz"
          curl -fsSL -o "$CHECKSUMS"     "$BASE/$CHECKSUMS"
          curl -fsSL -o "$CHECKSUMS.sig" "$BASE/$CHECKSUMS.sig"
          curl -fsSL -o "$CHECKSUMS.pem" "$BASE/$CHECKSUMS.pem"
          curl -fsSL -o "$ARCHIVE"       "$BASE/$ARCHIVE"
          cosign verify-blob \
            --certificate "$CHECKSUMS.pem" \
            --signature   "$CHECKSUMS.sig" \
            --certificate-identity-regexp "^https://github\.com/${{ github.repository }}/\.github/workflows/_release\.yml@" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$CHECKSUMS"
          gh attestation verify "$ARCHIVE" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run e2e tests (${{ matrix.distro }})
        run: ./test/run-e2e-release.sh
        env:
          DOTD_VERSION: ${{ inputs.version }}

      - name: Open issue on failure
        if: failure()
        run: |
          gh issue create \
            --title "e2e failure: ${{ inputs.version }} (${{ matrix.distro }})" \
            --body "E2e tests failed for release [${{ inputs.version }}](https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}) on \`${{ matrix.distro }}\`.\n\nWorkflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
